name: Build and Push to Huawei Cloud SWR

on:
  # push:
  #   branches:
  #     - main   # Uncomment this later to trigger automatically on push
  workflow_dispatch:   # Allows you to trigger the workflow manually from GitHub Actions UI

env:
  SWR_DOMAIN: swr.af-south-1.myhuaweicloud.com
  TAG: ${{ github.sha }}  # You can also use v1.0.${{ github.run_number }} for versioning
  IMAGE_NAME: admin-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to SWR
        run: |
          docker login -u "${{ secrets.SWR_USERNAME }}" \
                      -p "${{ secrets.SWR_PASSWORD }}" \
                      "$SWR_DOMAIN

      - name: Build Docker image
        run: |
          docker build -t $SWR_DOMAIN/${{ secrets.ORG_NAME }}/$IMAGE_NAME:$TAG .

      - name: Push Docker image
        run: |
          docker push $SWR_DOMAIN/${{ secrets.ORG_NAME }}/$IMAGE_NAME:$TAG